services:
  app:
    build:
      context: .
      target: build
    container_name: catan-front-end
    ports:
      - "3000:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
  
  db:
    env_file: .env
    image: mysql:latest
    container_name: catan-db
    ports:
      - "3306:3306"